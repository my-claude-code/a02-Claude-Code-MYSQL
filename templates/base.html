<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notes{% endblock %} — Entra Notes</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -.3px; }
    .note-card { transition: box-shadow .15s ease-in-out; }
    .note-card:hover { box-shadow: 0 .25rem .75rem rgba(0, 0, 0, .1); }
    .note-body-preview {
      white-space: pre-wrap;
      max-height: 3.5rem;
      overflow: hidden;
      color: #6c757d;
      font-size: .875rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">Entra Notes</a>
      {% if session.user %}
      <div class="d-flex align-items-center ms-auto gap-3">
        <span class="text-white-50 small d-none d-md-inline">
          {{ session.user.name or session.user.email }}
        </span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
          Sign out
        </a>
      </div>
      {% endif %}
    </div>
  </nav>

  <main class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"
                  aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQxhKkzJCNsPpkMEO/OVCM5aJoN"
          crossorigin="anonymous"></script>
</body>
</html>
