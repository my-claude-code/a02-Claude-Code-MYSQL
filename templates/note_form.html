{% extends "base.html" %}
{% block title %}{{ action }} Note{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h3 fw-bold mb-0">{{ action }} Note</h1>
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm">
        Back to Dashboard
      </a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input type="text"
                   class="form-control"
                   id="title"
                   name="title"
                   value="{{ note.title if note else '' }}"
                   placeholder="Note title"
                   required
                   maxlength="255"
                   autofocus>
          </div>

          <div class="mb-4">
            <label for="body" class="form-label fw-semibold">Body</label>
            <textarea class="form-control"
                      id="body"
                      name="body"
                      rows="12"
                      placeholder="Write your note here...">{{ note.body if note else '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ action }} Note</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
